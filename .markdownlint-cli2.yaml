# Markdownlint Configuration
#
# This config follows Prettier compatibility guidelines to enable seamless copying
# of markdown files between projects that use Prettier for formatting.
# See: https://github.com/DavidAnson/markdownlint/blob/main/doc/Prettier.md

config:

  # ═══════════════════════════════════════════════════════════════════════════
  # PRETTIER-COMPATIBLE SETTINGS
  # These rules are disabled to avoid conflicts with Prettier formatting.
  # Reference: https://github.com/DavidAnson/markdownlint/blob/main/style/prettier.json
  # ═══════════════════════════════════════════════════════════════════════════

  # Heading style - disabled for Prettier compatibility
  MD003: false

  # Line length - disabled for Prettier compatibility
  # (Also needed for agent templates with long tool lists and descriptions)
  MD013: false

  # Ordered list prefix - disabled for Prettier compatibility
  # (Sequential numbering 1/2/3 is more readable than all-1s)
  MD029: false

  # Code fence style - disabled for Prettier compatibility
  MD048: false

  # Emphasis style - disabled for Prettier compatibility
  MD049: false

  # Strong style - disabled for Prettier compatibility
  MD050: false

  # ═══════════════════════════════════════════════════════════════════════════
  # PROJECT-SPECIFIC SETTINGS
  # These rules are project requirements that don't conflict with Prettier.
  # ═══════════════════════════════════════════════════════════════════════════

  # Table column style - disabled, tables are readable as-is
  MD060: false

  # Fenced code language - REQUIRED for syntax highlighting
  # Note: 3 known false positives in nested template files (retrospective.md, roadmap.md)
  # where nested code blocks cause parser confusion
  MD040: true

  # Inline HTML - allow specific elements, flag unescaped generic types
  MD033:
    allowed_elements:
      - br
      - code
      - kbd
      - sup
      - sub
      - details
      - summary
      - code
      - strong
      - code
      - example

  # Multiple H1 - allow in agent templates (frontmatter can create implicit H1)
  MD025:
    front_matter_title: ""

  # Code block style - consistent fenced style (not a Prettier conflict)
  MD046:
    style: "fenced"

  # List marker style - consistent dashes (not a Prettier conflict)
  MD004:
    style: "dash"

  # First line heading - required by default
  MD041: true

# NOTE: top-level `globs:` removed deliberately. markdownlint-cli2 ADDS
# config globs to any files passed on the command line, so a hook that
# lints one touched file (`markdownlint-cli2 --fix path/to/file.md`)
# would also walk every `**/*.md` in the repo and take minutes per
# invocation. Callers that want to lint the whole repo MUST pass
# `**/*.md` (or a narrower glob) on the command line; see
# `scripts/validation/pre_pr.py` for the canonical full-repo call.
# `ignores:` stays in config so explicit walks still honor exclusions.

ignores:
  # Version control and build artifacts. Without these, a `**/*.md` walk
  # recurses through `.git/objects/`, npm cache trees, mypy/pytest/ruff
  # caches, and worktree mirrors -- counting every directory entry
  # along the way. Pre-fix the full-repo lint enumerated 373,381 paths
  # to find 696 real `.md` files. This list narrows the walk to the
  # source tree.
  - ".git/**"
  - "**/node_modules/**"
  - ".venv/**"
  - ".mypy_cache/**"
  - ".pytest_cache/**"
  - ".pytest_tmp/**"
  - ".ruff_cache/**"
  - "ai_agents.egg-info/**"
  - "dist/**"
  # Worktrees are duplicate working copies, not unique source.
  - ".claude/worktrees/**"
  # Internal tooling outputs and provider caches: not authored .md.
  - ".agents/**"
  - ".serena/**"
  - ".claude-mem/**"
  - ".forgetful/**"
  - ".diffray/**"
  - ".flowbaby/**"
  - ".factory/**"
  - ".codeql/**"
  - ".baseline/**"
  - ".gemini/**"
  - ".vscode/**"
  - ".config/**"
  - "tmp/**"
  - "**/*.ps1"
  - "**/*.psm1"

  # User instruction files - these are APPENDED to existing user files during installation
  # and cannot start with H1 (MD041). They are simple, controlled content that we manually
  # verify. No inline suppression is used because it would propagate to user files
  - "src/claude/claude-instructions.template.md"
  - "src/vs-code-agents/copilot-instructions.md"
  - "src/copilot-cli/copilot-instructions.md"

  # Prompt templates with intentional nested code blocks and XML-like tags (scratchpad, etc.)
  # that confuse the parser. These are prompt content, not markdown errors
  - "docs/autonomous-pr-monitor.md"
  - "docs/autonomous-issue-development.md"

  # Skills treated as third-party plugins per PR #331 - blanket exclusion
  - ".claude/skills/**"

  # TEMPORARY: Agent definition files (.github/agents/*.agent.md) have pre-existing linting
  # issues being fixed in a separate PR. This exclusion unblocks PR #847.
  # TODO: Remove this exclusion after the linting fix PR merges
  - ".github/agents/**/*.agent.md"

  # CLAUDE.md files are managed by the claude-mem plugin which prepends <claude-mem-context>
  # HTML tags, violating MD033 and MD041. These are tool-managed metadata, not authored markdown.
  - "**/CLAUDE.md"

  # Lifecycle command files have only YAML frontmatter, no H1 heading. MD041 not applicable.
  # Only the 5 lifecycle commands are excluded; other command files retain full linting.
  # /review is excluded from this list because it was converted from a lifecycle
  # command to a proper skill in #2042; its SKILL.md has an H1 heading and is
  # fully linted.
  - ".claude/commands/spec.md"
  - ".claude/commands/plan.md"
  - ".claude/commands/build.md"
  - ".claude/commands/test.md"
  - ".claude/commands/ship.md"

  # Copilot CLI mirrors of the lifecycle command files. Same structure as
  # `.claude/commands/{spec,plan,build,test,ship}.md`: YAML frontmatter
  # followed by `@CLAUDE.md` and prose, with no H1 heading. The Claude Code
  # paths above were excluded; the Copilot CLI mirrors were missed in that
  # PR and only surface when hooks are configured (see CONTRIBUTING.md).
  - "src/copilot-cli/skills/spec/SKILL.md"
  - "src/copilot-cli/skills/plan/SKILL.md"
  - "src/copilot-cli/skills/build/SKILL.md"
  - "src/copilot-cli/skills/test/SKILL.md"
  - "src/copilot-cli/skills/ship/SKILL.md"
