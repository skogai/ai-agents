# Citation Verification
#
# Runs citation schema verification on memory files modified in PRs.
# Uses the memory_enhancement CLI verify-all command to detect stale citations.
#
# Exit codes: 0 = pass, 1 = stale citations (fail), 2 = error
#
# IMPORTANT: This workflow runs on ALL PRs to satisfy required status checks,
# but skips actual verification when no relevant files are changed.

name: Citation Verification

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-paths:
    name: Detect changes
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    outputs:
      should-verify: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.memories || steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check path filters
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            memories:
              - '.serena/memories/**'
            code:
              - '.claude/skills/memory-enhancement/**'

  verify-citations:
    name: Verify citations
    needs: check-paths
    if: needs.check-paths.outputs.should-verify == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup code environment
        uses: ./.github/actions/setup-code-env
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pester: false
          enable-git-hooks: false

      - name: Verify all citations
        run: |
          python3 -m memory_enhancement --repo-root . --memories-dir .serena/memories verify-all

  skip-verification:
    name: Skip verification (no changes)
    needs: check-paths
    if: needs.check-paths.outputs.should-verify != 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 1
    steps:
      - name: Checkout code
        # Required for dorny/paths-filter pattern consistency
        # See: .serena/memories/ci-infrastructure-dorny-paths-filter-checkout.md
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Skip message
        run: |
          echo "No memory or code changes detected - skipping citation verification"
