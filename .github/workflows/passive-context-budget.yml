# Passive Context Token Budget Validation
#
# Validates that passive context files (AGENTS.md, CLAUDE.md) stay within
# their token budgets. Implements the Vercel research recommendation of
# <8KB compressed passive context per file.
#
# Exit codes: 0 = pass, 1 = budget exceeded
#
# IMPORTANT: This workflow runs on ALL PRs to satisfy required status checks,
# but skips actual validation when no relevant files are changed.

name: Passive Context Budget

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-paths:
    name: Detect changes
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    outputs:
      should-run-budget: ${{ steps.determine.outputs.should-run-budget }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check path filters
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            context:
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - '.claude/CLAUDE.md'
            validator:
              - 'scripts/validation/passive_context_budget.py'
              - 'tests/test_validation_passive_context_budget.py'

      - name: Determine if budget validation should run
        id: determine
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          FILTER_OUTPUTS: ${{ toJson(steps.filter.outputs) }}
          FILTER_KEYS: context,validator
          OUTPUT_NAME: should-run-budget
        run: python3 scripts/workflows/determine_should_run_from_filters.py

  validate-budget:
    name: Validate budget
    needs: check-paths
    if: needs.check-paths.outputs.should-run-budget == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Run budget validator
        run: |
          python3 -m scripts.validation.passive_context_budget --ci

  skip-budget:
    name: Skip budget (no changes)
    needs: check-paths
    if: needs.check-paths.outputs.should-run-budget != 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Skip message
        run: |
          echo "No passive context changes detected - skipping budget validation"
