# Validate Marketplace Counts
#
# Ensures marketplace.json plugin descriptions have accurate counts
# of agents, commands, hooks, and skills.
#
# Runs on PRs that change relevant source directories or marketplace.json.
# Skips validation when no relevant files are changed.
#
# Related: Issue rjmurillo/ai-agents#1552

name: Validate Marketplace Counts

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-paths:
    name: Check Changed Paths
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    outputs:
      should-validate: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.paths }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for relevant file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            paths:
              - '.claude-plugin/marketplace.json'
              - '.github/plugin/marketplace.json'
              - 'src/claude/**'
              - 'src/copilot-cli/**'
              - '.claude/agents/**'
              - '.claude/commands/**'
              - '.claude/hooks/**'
              - '.claude/skills/**'
              - 'build/scripts/validate_marketplace_counts.py'
              - 'build/scripts/yaml_loader.py'
              - 'templates/marketplace-counters.yaml'
              - '.github/workflows/validate-marketplace-counts.yml'

  validate:
    name: Validate Marketplace Counts
    needs: check-paths
    if: needs.check-paths.outputs.should-validate == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup code environment
        uses: ./.github/actions/setup-code-env
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pester: false
          enable-git-hooks: false

      - name: Validate marketplace.json counts
        run: python3 build/scripts/validate_marketplace_counts.py

      - name: Show fix instructions on failure
        if: failure()
        run: |
          echo ""
          echo "=== Marketplace Count Validation Failed ==="
          echo ""
          echo "Plugin descriptions in marketplace.json have stale counts."
          echo ""
          echo "To fix:"
          echo "  python3 build/scripts/validate_marketplace_counts.py --fix"
          echo ""

  skip-validation:
    name: Validate Marketplace Counts (Skipped)
    needs: check-paths
    if: needs.check-paths.outputs.should-validate != 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Skip validation (no relevant files changed)
        run: echo "No relevant files changed - skipping marketplace count validation"
