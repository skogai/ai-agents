name: Slash Command Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-paths:
    runs-on: ubuntu-24.04-arm
    permissions:
      pull-requests: read
    outputs:
      should-run-commands: ${{ steps.filter.outputs.commands == 'true' || steps.filter.outputs.validator == 'true' || steps.filter.outputs.spec_evals == 'true' }}
      spec_evals_changed: ${{ steps.filter.outputs.spec_command == 'true' || steps.filter.outputs.spec_evals == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            commands:
              - '.claude/commands/**/*.md'
            spec_command:
              - '.claude/commands/spec.md'
            spec_evals:
              - 'tests/evals/spec-scenarios.json'
              - 'scripts/eval/eval-prompt-change.py'
            validator:
              - '.claude/skills/slashcommandcreator/scripts/validate_slash_command.py'
              - 'scripts/modules/slash_command_validator.py'

  validate-slash-commands:
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    if: needs.check-paths.outputs.should-run-commands == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup code environment
        uses: ./.github/actions/setup-code-env
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pester: false
          enable-git-hooks: false

      - name: Validate slash commands
        run: python3 -c "from scripts.modules.slash_command_validator import invoke_slash_command_validation; raise SystemExit(invoke_slash_command_validation())"

      - name: Run /spec behavioral evals
        if: |
          github.event_name == 'pull_request' &&
          needs.check-paths.outputs.spec_evals_changed == 'true' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: python3 scripts/eval/eval-prompt-change.py --prompt .claude/commands/spec.md --scenarios tests/evals/spec-scenarios.json --base-ref "$BASE_REF"

  skip-validation:
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    if: needs.check-paths.outputs.should-run-commands != 'true'
    permissions: {}
    steps:
      - name: Skip validation
        run: echo "No slash command changes detected, skipping validation"
