# Skill/Passive Context Compliance
#
# Validates that content placement follows the skill vs passive context decision
# framework. Runs the compliance checker script against skills and CLAUDE.md.
#
# Exit codes: 0 = pass, 1 = violations detected
#
# IMPORTANT: This workflow runs on ALL PRs to satisfy required status checks,
# but skips actual validation when no relevant files are changed.

name: Skill/Passive Context Compliance

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-paths:
    name: Detect changes
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    outputs:
      should-run-compliance: ${{ steps.determine.outputs.should-run-compliance }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check path filters
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            skills:
              - '.claude/skills/**/SKILL.md'
            context:
              - 'CLAUDE.md'
              - 'AGENTS.md'
            validator:
              - '.claude/skills/context-optimizer/scripts/test_skill_passive_compliance.py'

      - name: Determine if compliance validation should run
        id: determine
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          FILTER_OUTPUTS: ${{ toJson(steps.filter.outputs) }}
          FILTER_KEYS: skills,context,validator
          OUTPUT_NAME: should-run-compliance
        run: python3 scripts/workflows/determine_should_run_from_filters.py

  validate-compliance:
    name: Validate compliance
    needs: check-paths
    if: needs.check-paths.outputs.should-run-compliance == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Run compliance checks
        run: |
          python3 .claude/skills/context-optimizer/scripts/test_skill_passive_compliance.py \
            --path .claude/skills \
            --claude-md-path CLAUDE.md \
            --format table

  skip-compliance:
    name: Skip compliance (no changes)
    needs: check-paths
    if: needs.check-paths.outputs.should-run-compliance != 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 1
    steps:
      - name: Checkout code
        # Required for dorny/paths-filter pattern consistency
        # See: .serena/memories/ci-infrastructure-dorny-paths-filter-checkout.md
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Skip message
        run: |
          echo "No skill or context changes detected - skipping compliance validation"
