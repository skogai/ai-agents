# Agent Drift Detection (CI)
#
# Diff-linting workflow that detects when generated platform-specific agent files
# have drifted from their source templates. Runs on PRs that modify agent files.
#
# This workflow is part of Phase 2 of the agent consolidation epic.
# See: .agents/roadmap/epic-agent-consolidation.md
#
# How it works:
#   1. Regenerates all platform-specific files from source templates
#   2. Compares regenerated output with committed files
#   3. Fails CI if semantic drift is detected
#   4. Provides an actionable diff showing exactly what diverged
#
# Bypass procedure (intentional divergence):
#   If you intentionally want a generated file to differ from its template:
#   1. Add [skip-drift-check] anywhere in a commit message on the PR
#   2. Document the reason in your PR description
#   3. Update templates/README.md to record the intentional difference
#   4. Ensure the PR has explicit code-owner approval
#
# Running locally:
#   python3 build/generate_agents.py --validate

name: Agent Drift Detection (CI)

on:
  pull_request:
    branches:
      - main
    # NO paths filter here. Handled internally via dorny/paths-filter so that
    # required status checks still pass on PRs that don't touch agent files.
  workflow_dispatch: # Allow manual triggering for debugging

concurrency:
  group: agent-drift-detection-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Phase 1: Determine whether validation is needed ────────────────────────
  check-paths:
    name: Agent Drift Detection
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    outputs:
      should-run-drift: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.determine.outputs.should-run-drift }}
      bypass-requested: ${{ steps.bypass.outputs.bypass-requested }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          # Need full history to inspect commit messages for bypass markers
          fetch-depth: 0

      - name: Check for bypass marker in commit messages
        id: bypass
        if: github.event_name != 'workflow_dispatch'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Check all commits in this PR for [skip-drift-check]
          BYPASS=$(git log "$BASE_SHA..$HEAD_SHA" --format="%s %b" | grep -c '\[skip-drift-check\]' || true)
          if [ "$BYPASS" -gt 0 ]; then
            echo "bypass-requested=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Bypass marker [skip-drift-check] detected in commit message(s)."
          else
            echo "bypass-requested=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for relevant file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            agents:
              - 'templates/**'
              - 'src/vs-code-agents/**'
              - 'src/copilot-cli/**'
              - 'build/generate_agents.py'
              - 'build/scripts/build_all.py'
              - 'build/scripts/check_plugin_manifest_parity.py'
              - 'scripts/sync_plugin_lib.py'
              - 'scripts/ai_review_common/**'
              - 'scripts/github_core/**'
              - 'scripts/hook_utilities/**'
              - '.claude/lib/**'
              - '.claude/.claude-plugin/plugin.json'
              - 'src/copilot-cli/.claude-plugin/plugin.json'
              - '.github/workflows/agent-drift-detection.yml'

      - name: Determine if validation should run
        id: determine
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-run-drift=true" >> "$GITHUB_OUTPUT"
            echo "Decision: Run validation (manual trigger)"
          elif [ "${{ steps.filter.outputs.agents }}" = "true" ]; then
            echo "should-run-drift=true" >> "$GITHUB_OUTPUT"
            echo "Decision: Run validation (agent files changed)"
          else
            echo "should-run-drift=false" >> "$GITHUB_OUTPUT"
            echo "Decision: Skip validation (no agent files changed)"
          fi

  # ─── Phase 2: Validate, only when relevant files changed ────────────────────
  validate:
    name: Agent Drift Detection
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    # Run when validation is needed AND no bypass was requested
    if: |
      needs.check-paths.outputs.should-run-drift == 'true' &&
      needs.check-paths.outputs.bypass-requested != 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup code environment
        uses: ./.github/actions/setup-code-env
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pester: false
          enable-git-hooks: false

      - name: Regenerate and validate agent files
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          echo "Running agent generation in validation mode..."
          echo "This regenerates all platform-specific files from source templates"
          echo "and compares them against committed files."
          echo ""

          python3 build/generate_agents.py --validate

      - name: Check plugin lib mirrors are in sync
        id: lib-mirror
        continue-on-error: true
        shell: bash
        run: |
          mirror_rc=0
          build_rc=0
          echo "Checking scripts/ -> .claude/lib/ sync via sync_plugin_lib.py --check"
          python3 scripts/sync_plugin_lib.py --check || mirror_rc=$?
          echo ""
          echo "Checking .claude/lib/ -> src/copilot-cli/lib/ sync via build_all.py --check"
          python3 build/scripts/build_all.py --check || build_rc=$?
          if [ "$mirror_rc" -ne 0 ]; then
            exit "$mirror_rc"
          fi
          exit "$build_rc"

      - name: Check plugin manifest version parity
        id: manifest-parity
        continue-on-error: true
        shell: bash
        run: |
          echo "Checking .claude/.claude-plugin/plugin.json and src/copilot-cli/.claude-plugin/plugin.json carry identical versions"
          python3 build/scripts/check_plugin_manifest_parity.py

      - name: Show diff on failure
        if: >
          always() &&
          (steps.validate.outcome == 'failure' ||
           steps.lib-mirror.outcome == 'failure' ||
           steps.manifest-parity.outcome == 'failure')
        shell: bash
        env:
          VALIDATE_CONCLUSION: ${{ steps.validate.outcome }}
          LIB_MIRROR_CONCLUSION: ${{ steps.lib-mirror.outcome }}
          MANIFEST_PARITY_CONCLUSION: ${{ steps.manifest-parity.outcome }}
        run: |
          echo ""
          echo "==========================================================="
          echo "  AGENT DRIFT DETECTED"
          echo "==========================================================="
          echo ""
          echo "Generated agent files or plugin mirrors do not match committed files."
          echo "Validation conclusions:"
          echo "  generate_agents: $VALIDATE_CONCLUSION"
          echo "  lib mirrors: $LIB_MIRROR_CONCLUSION"
          echo "  manifest parity: $MANIFEST_PARITY_CONCLUSION"
          echo ""

          if [ "$VALIDATE_CONCLUSION" = "failure" ]; then
            python3 build/generate_agents.py
          fi
          if [ "$LIB_MIRROR_CONCLUSION" = "failure" ]; then
            python3 scripts/sync_plugin_lib.py || true
            python3 build/scripts/build_all.py || true
          fi

          # Show which files drifted
          changed_files=$(git diff --name-only)
          if [ -n "$changed_files" ]; then
            echo "--- Files with semantic drift ---"
            echo "$changed_files" | while read -r file; do
              echo "  x  $file"
            done
            echo ""

            echo "--- How to fix ---"
            echo ""
            echo "  1. Edit the source template (NOT the generated file):"
            echo "       templates/agents/<agent-name>.shared.md"
            echo ""
            echo "  2. Regenerate platform-specific files:"
            echo "       python3 build/generate_agents.py"
            echo ""
            echo "  3. Commit the regenerated files:"
            echo "       git add src/vs-code-agents/ src/copilot-cli/"
            echo "       git commit -m 'fix(agents): regenerate from updated template'"
            echo ""
            echo "--- Bypass procedure (intentional divergence) ---"
            echo ""
            echo "  If this divergence is intentional:"
            echo "  1. Add [skip-drift-check] to a commit message in this PR"
            echo "  2. Document the reason in your PR description"
            echo "  3. Update templates/README.md with the intentional difference"
            echo "  4. Ensure explicit code-owner approval on this PR"
            echo ""
            echo "--- Detailed diff ---"
            echo ""
            git diff
          fi

      - name: Fail when any drift check fails
        if: >
          always() &&
          (steps.validate.outcome == 'failure' ||
           steps.lib-mirror.outcome == 'failure' ||
           steps.manifest-parity.outcome == 'failure')
        shell: bash
        run: |
          echo "One or more drift checks failed. See the diff output above."
          exit 1

      - name: Write job summary
        if: always()
        shell: bash
        env:
          VALIDATE_CONCLUSION: ${{ steps.validate.outcome }}
          LIB_MIRROR_CONCLUSION: ${{ steps.lib-mirror.outcome }}
          MANIFEST_PARITY_CONCLUSION: ${{ steps.manifest-parity.outcome }}
        run: |
          if [ "$VALIDATE_CONCLUSION" = "success" ] && \
             [ "$LIB_MIRROR_CONCLUSION" = "success" ] && \
             [ "$MANIFEST_PARITY_CONCLUSION" = "success" ]; then
            {
              echo "## Agent Drift Detection Passed"
              echo ""
              echo "All generated agent files match their source templates."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Agent Drift Detection Failed"
              echo ""
              echo "Generated agent files have drifted from their source templates."
              echo ""
              echo "### Fix"
              echo "1. Edit the source template in \`templates/agents/*.shared.md\`"
              echo "2. Run: \`python3 build/generate_agents.py\`"
              echo "3. Commit the regenerated files"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo ""
            echo "### Monitored Paths"
            echo "- \`templates/\` - source templates"
            echo "- \`src/vs-code-agents/\` - generated VS Code agents"
            echo "- \`src/copilot-cli/\` - generated Copilot CLI agents"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Bypass warning, runs instead of validate when bypass is active ──────────
  bypass-warning:
    name: Agent Drift Detection
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    if: |
      needs.check-paths.outputs.should-run-drift == 'true' &&
      needs.check-paths.outputs.bypass-requested == 'true'
    permissions:
      contents: read

    steps:
      - name: Bypass acknowledged, drift check skipped
        run: |
          echo "⚠️  Agent drift detection bypassed via [skip-drift-check] commit marker."
          echo ""
          echo "This check has been intentionally skipped for this PR."
          echo ""
          echo "Bypass requirements:"
          echo "  ✔  [skip-drift-check] marker present in a commit message"
          echo "  ☐  Reason documented in PR description"
          echo "  ☐  templates/README.md updated with intentional difference"
          echo "  ☐  Explicit code-owner approval obtained"
          echo ""
          echo "Status: PASS (bypassed, manual approval required)"

      - name: Write bypass summary
        run: |
          {
            echo "## Agent Drift Detection - Bypassed"
            echo ""
            echo "Drift detection was skipped because a \`[skip-drift-check]\` marker was found in a commit message."
            echo ""
            echo "**Bypass checklist:**"
            echo "- [ ] Reason documented in PR description"
            echo "- [ ] \`templates/README.md\` updated with intentional difference"
            echo "- [ ] Explicit code-owner approval obtained"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Skip job, provides passing status when no agent files changed ───────────
  # Uses the SAME NAME as the real validation job so required status checks pass.
  # (Dual-job same-name pattern from Issue #335)
  skip:
    name: Agent Drift Detection
    needs: check-paths
    if: needs.check-paths.outputs.should-run-drift != 'true'
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Skip validation (no agent files changed)
        run: |
          echo "Agent drift detection skipped. No relevant file changes detected."
          echo ""
          echo "This PR only contains changes to files that don't affect generated agents."
          echo ""
          echo "Monitored paths that would trigger validation:"
          echo "  - templates/**"
          echo "  - src/vs-code-agents/**"
          echo "  - src/copilot-cli/**"
          echo "  - build/generate_agents.py"
          echo "  - .github/workflows/agent-drift-detection.yml"
          echo ""
          echo "Status: PASS (skipped, no relevant changes)"
