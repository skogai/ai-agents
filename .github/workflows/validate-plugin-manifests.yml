# Validate Plugin Manifests
#
# Deterministic schema check for every .claude-plugin/plugin.json.
# Catches regressions like PR #1773 where invalid `agents`/`hooks` shapes
# broke plugin install for all consumers
# ("Validation errors: hooks: Invalid input, agents: Invalid input").
#
# Implementation lives in the reusable composite action at
# .github/actions/validate-plugin-manifests so other workflows can call
# the same conformance check.

name: Validate Plugin Manifests

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-paths:
    name: Check Changed Paths
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    outputs:
      should-run-manifests: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.paths }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Check for relevant file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            paths:
              - '**/.claude-plugin/plugin.json'
              - '**/hooks/hooks.json'
              - 'build/scripts/validate_plugin_manifests.py'
              - 'tests/build_scripts/test_validate_plugin_manifests.py'
              - '.github/actions/validate-plugin-manifests/**'
              - '.github/workflows/validate-plugin-manifests.yml'

  validate:
    name: Validate Plugin Manifests
    needs: check-paths
    if: needs.check-paths.outputs.should-run-manifests == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run plugin manifest schema check
        uses: ./.github/actions/validate-plugin-manifests

      # The hook anchoring gate imports build/scripts/generate_hooks.py, which
      # depends on PyYAML (pinned in pyproject.toml). The preceding composite
      # action already set up Python 3.14, so reuse that interpreter and only
      # install the missing dependency, so the gate fails on a real anchoring
      # violation, not on a missing module.
      - name: Install hook anchoring gate dependencies
        run: python3 -m pip install 'PyYAML==6.0.3'

      # Server-side enforcement of the hook-anchoring contract (issue #2205,
      # FM #11, ADR-071). The pre-push hook also runs this, but pre-push is
      # local and bypassable; this gate runs in CI on any plugin hooks.json or
      # manifest change so a hand-edit or merge cannot ship an unanchored path.
      - name: Run hook anchoring gate
        run: python3 scripts/validation/validate_hook_anchoring.py

  skip-validation:
    name: Validate Plugin Manifests (Skipped)
    needs: check-paths
    if: needs.check-paths.outputs.should-run-manifests != 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Skip validation (no relevant files changed)
        run: echo "No relevant files changed - skipping plugin manifest validation"
