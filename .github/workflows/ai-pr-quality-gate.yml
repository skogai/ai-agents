name: AI PR Quality Gate

# AI-powered PR review using GitHub Copilot CLI

# Invokes security, qa, and analyst agents to review PRs IN PARALLEL

# Blocks merge if CRITICAL_FAIL detected

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    # NO paths filter - use dorny/paths-filter internally to satisfy required checks

  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number
      enable_debouncing:
        description: 'Enable debouncing delay to reduce race conditions (adds 10s latency)'
        required: false
        type: boolean
        default: false
      bypass-cache:
        description: 'Bypass cached review results and force fresh Copilot API calls'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: write

# Concurrency control: Attempts to cancel in-progress runs when new runs start

# NOTE: GitHub Actions does NOT guarantee run coalescing - race conditions can occur

# where multiple runs start before cancellation takes effect. Multiple review runs

# may execute simultaneously, wasting compute until cancellation completes.

# See ADR-026 (../.agents/architecture/ADR-026-pr-automation-concurrency-and-safety.md)

# for architectural decision on workflow-level concurrency control

# Mitigation: Path filtering, timeouts, and PR-specific temp files reduce impact

concurrency:
  group: ai-quality-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

env:

# Compute PR number from either pull_request event or workflow_dispatch input

  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

jobs:
  # Optional debouncing job - runs only when enable_debouncing=true
  debounce:
    name: Debounce Workflow
    if: (github.event_name == 'workflow_dispatch' && inputs.enable_debouncing == true) || (github.event_name == 'pull_request' && vars.ENABLE_DEBOUNCE == 'true')
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      
      - name: Apply debouncing delay
        uses: ./.github/actions/workflow-debounce
        with:
          delay-seconds: '10'
          workflow-name: 'AI PR Quality Gate'
          concurrency-group: ${{ github.event.pull_request.number || inputs.pr_number }}

# Check if relevant files changed using paths-filter

  check-changes:
    name: Check Changes
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    needs: debounce
    if: |-
      always() &&
      (needs.debounce.result == 'success' || needs.debounce.result == 'skipped')

    outputs:
      # For workflow_dispatch, always run review (manual trigger assumes user intent regardless of files changed); otherwise use paths-filter result
      should-run-review: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.determine.outputs.should-run-review }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Check for relevant file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        # Skip paths-filter for workflow_dispatch (path filter requires pull_request event context; manual dispatch lacks base/head ref information)
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            relevant:
              - 'src/**'
              - 'scripts/**'
              - 'build/**'
              - '.github/**'
              - '.agents/**'
              - '!.agents/planning/**'
              - '!.agents/sessions/**'
              - '.claude/skills/**'

      - name: Determine if review should run
        id: determine
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_EVENT_NAME: ${{ github.event_name }}
          RELEVANT: ${{ steps.filter.outputs.relevant }}
        run: python3 scripts/quality_gate/determine_should_run.py

# ==============================================================================
# Infrastructure Health Check (Issue #153)
# ==============================================================================
#
# Lightweight, zero-cost validation of agent prerequisites.
# Distinguishes environment errors from code quality issues.
# When Copilot CLI is unavailable, agents are skipped (not failed).

  infra-check:
    name: Infrastructure Check
    runs-on: ubuntu-24.04-arm
    needs: check-changes
    if: always() && needs.check-changes.result == 'success' && needs.check-changes.outputs.should-run-review == 'true'
    timeout-minutes: 2
    permissions:
      contents: read

    outputs:
      copilot-available: ${{ steps.infra.outputs.copilot-available }}
      overall-status: ${{ steps.infra.outputs.overall-status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Check agent infrastructure
        id: infra
        uses: ./.github/actions/check-agent-infrastructure
        with:
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Report infrastructure status
        if: steps.infra.outputs.overall-status != 'ready'
        shell: bash
        env:
          INFRA_STATUS: ${{ steps.infra.outputs.overall-status }}
          COPILOT_STATUS: ${{ steps.infra.outputs.copilot-available }}
        run: |
          echo "::warning::Agent infrastructure is $INFRA_STATUS."
          echo "::warning::Copilot available: $COPILOT_STATUS"
          echo "::warning::Agent reviews requiring Copilot CLI will be skipped."

# ==============================================================================
# Review-axes drift check (REQ-008-03 backstop)
# ==============================================================================
#
# Pre-push hook (.githooks/pre-push Phase 5b) is bypassable via --no-verify.
# This job is the non-bypassable backstop. It runs the canonical-to-CI
# generator in --dry-run mode and fails the build if any committed
# .github/prompts/pr-quality-gate-{role}.md differs from what the canonical
# .claude/skills/review/references/{role}.md would produce.

  review-axes-drift-check:
    name: Review-axes drift check
    runs-on: ubuntu-24.04-arm
    needs: check-changes
    if: always() && needs.check-changes.result == 'success' && needs.check-changes.outputs.should-run-review == 'true'
    timeout-minutes: 2
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.14'

      - name: Run drift check
        id: drift
        run: python3 build/scripts/run_drift_check_ci.py

# ==============================================================================
# Pre-execute Tests (Issue #77: QA agent cannot run tests directly)
# ==============================================================================
#
# The QA agent runs via Copilot CLI (text-in/text-out) with no shell access.
# This job executes tests and passes results as context to the QA agent,
# enabling empirical test verification in QA verdicts.

  run-tests:
    name: Run Tests
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    needs: check-changes
    if: always() && needs.check-changes.result == 'success' && needs.check-changes.outputs.should-run-review == 'true'
    timeout-minutes: 10
    permissions:
      contents: read

    outputs:
      test-summary: ${{ steps.summary.outputs.test_summary }}
      # Issue #2108: surface the deterministic pytest status as an external
      # signal for the gate aggregator (scripts/external_signals/gate_aggregator.py).
      pytest-status: ${{ steps.pytest.outputs.pytest_status || 'SKIPPED' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup code environment
        uses: ./.github/actions/setup-code-env
        with:
          gh-token: ${{ github.token }}
          enable-python: 'true'
          enable-git-hooks: 'false'

      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: python3 scripts/quality_gate/run_pytest.py

      - name: Generate test summary
        id: summary
        env:
          PYTEST_STATUS: ${{ steps.pytest.outputs.pytest_status || 'SKIPPED' }}
          PYTEST_SUMMARY: ${{ steps.pytest.outputs.pytest_summary || 'Not executed' }}
        run: python3 scripts/quality_gate/generate_test_summary.py

# ==============================================================================
# Agent Review Jobs (10 Static Jobs)
# ==============================================================================
#
# Each canonical review axis has a dedicated job with a static name. This ensures
# status check contexts are always emitted with proper names, even when reviews
# are skipped due to file filtering.
#
# Why not matrix? Job-level `if:` conditions prevent matrix expansion, leaving
# check context names as unresolved placeholders (e.g., "${{ matrix.agent }} Review").
# Static jobs with step-level conditionals solve this by:
# 1. Job names resolve at parse time (not runtime)
# 2. Jobs always run, emitting proper status checks
# 3. Composite action (.github/actions/agent-review) encapsulates common workflow
#
# Trade-off: Ten job definitions (CVA) vs correctness (reliable status checks).

  security-review:
    name: Security Review
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check]
    if: always() && needs.check-changes.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run security review
        uses: ./.github/actions/agent-review
        with:
          agent: security
          emoji: 🔒
          prompt-file: .github/prompts/pr-quality-gate-security.md
          should-run: ${{ needs.check-changes.outputs.should-run-review == 'true' && needs.infra-check.outputs.copilot-available == 'true' }}
          pr-number: ${{ env.PR_NUMBER }}
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          bypass-cache: ${{ inputs.bypass-cache == true && 'true' || 'false' }}

  qa-review:
    name: QA Review
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check, run-tests]
    if: always() && needs.check-changes.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run qa review
        uses: ./.github/actions/agent-review
        with:
          agent: qa
          emoji: 🧪
          prompt-file: .github/prompts/pr-quality-gate-qa.md
          should-run: ${{ needs.check-changes.outputs.should-run-review == 'true' && needs.infra-check.outputs.copilot-available == 'true' }}
          pr-number: ${{ env.PR_NUMBER }}
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          additional-context: ${{ needs.run-tests.outputs.test-summary || 'Test execution was skipped (no relevant file changes or test job did not run).' }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          bypass-cache: ${{ inputs.bypass-cache == true && 'true' || 'false' }}

  analyst-review:
    name: Analyst Review
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check]
    if: always() && needs.check-changes.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run analyst review
        uses: ./.github/actions/agent-review
        with:
          agent: analyst
          emoji: 📊
          prompt-file: .github/prompts/pr-quality-gate-analyst.md
          should-run: ${{ needs.check-changes.outputs.should-run-review == 'true' && needs.infra-check.outputs.copilot-available == 'true' }}
          pr-number: ${{ env.PR_NUMBER }}
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          bypass-cache: ${{ inputs.bypass-cache == true && 'true' || 'false' }}

  architect-review:
    name: Architect Review
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check]
    if: always() && needs.check-changes.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run architect review
        uses: ./.github/actions/agent-review
        with:
          agent: architect
          emoji: 📐
          prompt-file: .github/prompts/pr-quality-gate-architect.md
          should-run: ${{ needs.check-changes.outputs.should-run-review == 'true' && needs.infra-check.outputs.copilot-available == 'true' }}
          pr-number: ${{ env.PR_NUMBER }}
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          bypass-cache: ${{ inputs.bypass-cache == true && 'true' || 'false' }}

  devops-review:
    name: DevOps Review
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check]
    if: always() && needs.check-changes.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run devops review
        uses: ./.github/actions/agent-review
        with:
          agent: devops
          emoji: ⚙️
          prompt-file: .github/prompts/pr-quality-gate-devops.md
          should-run: ${{ needs.check-changes.outputs.should-run-review == 'true' && needs.infra-check.outputs.copilot-available == 'true' }}
          pr-number: ${{ env.PR_NUMBER }}
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          bypass-cache: ${{ inputs.bypass-cache == true && 'true' || 'false' }}

  roadmap-review:
    name: Roadmap Review
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check]
    if: always() && needs.check-changes.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run roadmap review
        uses: ./.github/actions/agent-review
        with:
          agent: roadmap
          emoji: 🗺️
          prompt-file: .github/prompts/pr-quality-gate-roadmap.md
          should-run: ${{ needs.check-changes.outputs.should-run-review == 'true' && needs.infra-check.outputs.copilot-available == 'true' }}
          pr-number: ${{ env.PR_NUMBER }}
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          bypass-cache: ${{ inputs.bypass-cache == true && 'true' || 'false' }}

  reliability-review:
    name: Reliability Review
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check]
    if: always() && needs.check-changes.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run reliability review
        uses: ./.github/actions/agent-review
        with:
          agent: reliability
          review-agent: analyst
          emoji: 🛡️
          prompt-file: .github/prompts/pr-quality-gate-reliability.md
          should-run: ${{ needs.check-changes.outputs.should-run-review == 'true' && needs.infra-check.outputs.copilot-available == 'true' }}
          pr-number: ${{ env.PR_NUMBER }}
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          bypass-cache: ${{ inputs.bypass-cache == true && 'true' || 'false' }}

  observability-review:
    name: Observability Review
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check]
    if: always() && needs.check-changes.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run observability review
        uses: ./.github/actions/agent-review
        with:
          agent: observability
          review-agent: analyst
          emoji: 🔭
          prompt-file: .github/prompts/pr-quality-gate-observability.md
          should-run: ${{ needs.check-changes.outputs.should-run-review == 'true' && needs.infra-check.outputs.copilot-available == 'true' }}
          pr-number: ${{ env.PR_NUMBER }}
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          bypass-cache: ${{ inputs.bypass-cache == true && 'true' || 'false' }}

  agent-safety-review:
    name: Agent Safety Review
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check]
    if: always() && needs.check-changes.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run agent safety review
        uses: ./.github/actions/agent-review
        with:
          agent: agent-safety
          review-agent: analyst
          emoji: 🤖
          prompt-file: .github/prompts/pr-quality-gate-agent-safety.md
          should-run: ${{ needs.check-changes.outputs.should-run-review == 'true' && needs.infra-check.outputs.copilot-available == 'true' }}
          pr-number: ${{ env.PR_NUMBER }}
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          bypass-cache: ${{ inputs.bypass-cache == true && 'true' || 'false' }}

  decision-rigor-review:
    name: Decision Rigor Review
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check]
    if: always() && needs.check-changes.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run decision rigor review
        uses: ./.github/actions/agent-review
        with:
          agent: decision-rigor
          review-agent: analyst
          emoji: ⚖️
          prompt-file: .github/prompts/pr-quality-gate-decision-rigor.md
          should-run: ${{ needs.check-changes.outputs.should-run-review == 'true' && needs.infra-check.outputs.copilot-available == 'true' }}
          pr-number: ${{ env.PR_NUMBER }}
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          bypass-cache: ${{ inputs.bypass-cache == true && 'true' || 'false' }}

# ==============================================================================
# Aggregate Results from All Agent Reviews
# ==============================================================================
#
# Depends on all ten agent review jobs explicitly (not matrix).
# Downloads artifacts using pattern `review-*` to gather all agent verdicts.

  aggregate:
    name: Aggregate Results
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, infra-check, run-tests, security-review, qa-review, analyst-review, architect-review, devops-review, roadmap-review, reliability-review, observability-review, agent-safety-review, decision-rigor-review]
    # Always run to produce a SUCCESS check (not SKIPPED) for rulesets,
    # EXCEPT when the workflow itself is being cancelled (e.g. by concurrency).
    # Issue #2347: when concurrency cancels a run, upstream review jobs end
    # `cancelled` -> artifacts missing -> check_critical_failures exits 1 ->
    # PR head receives `Aggregate Results: failure`. If the superseding run
    # also gets cancelled before finishing, the stale failure persists and
    # blocks merge until a no-op commit refreshes the head SHA. Skipping the
    # aggregate when the workflow is cancelled prevents the stale failure;
    # the next non-cancelled run produces the authoritative status.
    if: always() && !cancelled()

    outputs:
      final-verdict: ${{ steps.aggregate.outputs.final_verdict }}

    steps:
      - name: Check if aggregation needed
        id: should-run-review
        env:
          SHOULD_RUN: ${{ needs.check-changes.outputs.should-run-review }}
        run: |
          if [ "$SHOULD_RUN" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipped - no relevant file changes detected"
          fi

      - name: Checkout repository
        if: steps.should-run-review.outputs.skip != 'true'
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Check for failed agents
        if: steps.should-run-review.outputs.skip != 'true'
        id: failed-agents
        env:
          SECURITY_RESULT: ${{ needs.security-review.result }}
          QA_RESULT: ${{ needs.qa-review.result }}
          ANALYST_RESULT: ${{ needs.analyst-review.result }}
          ARCHITECT_RESULT: ${{ needs.architect-review.result }}
          DEVOPS_RESULT: ${{ needs.devops-review.result }}
          ROADMAP_RESULT: ${{ needs.roadmap-review.result }}
          RELIABILITY_RESULT: ${{ needs.reliability-review.result }}
          OBSERVABILITY_RESULT: ${{ needs.observability-review.result }}
          AGENT_SAFETY_RESULT: ${{ needs.agent-safety-review.result }}
          DECISION_RIGOR_RESULT: ${{ needs.decision-rigor-review.result }}
        run: python3 scripts/quality_gate/check_failed_agents.py

      - name: Download all review artifacts
        if: steps.should-run-review.outputs.skip != 'true'
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          pattern: review-*
          path: ai-review-results
          merge-multiple: true

      - name: Validate artifact download
        if: steps.should-run-review.outputs.skip != 'true'
        run: python3 scripts/quality_gate/validate_artifact_download.py

      - name: Load review results
        if: steps.should-run-review.outputs.skip != 'true'
        id: load-results
        run: python3 scripts/quality_gate/load_review_results.py

      - name: Aggregate Verdicts
        if: steps.should-run-review.outputs.skip != 'true'
        id: aggregate
        env:
          SECURITY_VERDICT: ${{ steps.load-results.outputs.security_verdict }}
          QA_VERDICT: ${{ steps.load-results.outputs.qa_verdict }}
          ANALYST_VERDICT: ${{ steps.load-results.outputs.analyst_verdict }}
          ARCHITECT_VERDICT: ${{ steps.load-results.outputs.architect_verdict }}
          DEVOPS_VERDICT: ${{ steps.load-results.outputs.devops_verdict }}
          ROADMAP_VERDICT: ${{ steps.load-results.outputs.roadmap_verdict }}
          RELIABILITY_VERDICT: ${{ steps.load-results.outputs.reliability_verdict }}
          OBSERVABILITY_VERDICT: ${{ steps.load-results.outputs.observability_verdict }}
          AGENT_SAFETY_VERDICT: ${{ steps.load-results.outputs['agent-safety_verdict'] }}
          DECISION_RIGOR_VERDICT: ${{ steps.load-results.outputs['decision-rigor_verdict'] }}
          SECURITY_INFRA: ${{ steps.load-results.outputs.security_infra }}
          QA_INFRA: ${{ steps.load-results.outputs.qa_infra }}
          ANALYST_INFRA: ${{ steps.load-results.outputs.analyst_infra }}
          ARCHITECT_INFRA: ${{ steps.load-results.outputs.architect_infra }}
          DEVOPS_INFRA: ${{ steps.load-results.outputs.devops_infra }}
          ROADMAP_INFRA: ${{ steps.load-results.outputs.roadmap_infra }}
          RELIABILITY_INFRA: ${{ steps.load-results.outputs.reliability_infra }}
          OBSERVABILITY_INFRA: ${{ steps.load-results.outputs.observability_infra }}
          AGENT_SAFETY_INFRA: ${{ steps.load-results.outputs['agent-safety_infra'] }}
          DECISION_RIGOR_INFRA: ${{ steps.load-results.outputs['decision-rigor_infra'] }}
        run: python3 .github/scripts/aggregate_quality_verdicts.py

      # Issue #2108 / #1855: enforce the closed-loop rule (no PASS on LLM
      # verdicts alone) by feeding the deterministic pytest status plus the ten
      # agent verdicts into scripts/external_signals/gate_aggregator.py. This
      # is observable (continue-on-error) and reported below; it does not yet
      # replace the authoritative gate in check_critical_failures.py. Swapping
      # the final gate is tracked as a follow-up (see PR description).
      - name: External-signal gate (observe)
        if: steps.should-run-review.outputs.skip != 'true'
        id: external-gate
        continue-on-error: true
        env:
          PYTEST_STATUS: ${{ needs.run-tests.outputs.pytest-status }}
          SECURITY_VERDICT: ${{ steps.aggregate.outputs.security_verdict }}
          QA_VERDICT: ${{ steps.aggregate.outputs.qa_verdict }}
          ANALYST_VERDICT: ${{ steps.aggregate.outputs.analyst_verdict }}
          ARCHITECT_VERDICT: ${{ steps.aggregate.outputs.architect_verdict }}
          DEVOPS_VERDICT: ${{ steps.aggregate.outputs.devops_verdict }}
          ROADMAP_VERDICT: ${{ steps.aggregate.outputs.roadmap_verdict }}
          RELIABILITY_VERDICT: ${{ steps.aggregate.outputs.reliability_verdict }}
          OBSERVABILITY_VERDICT: ${{ steps.aggregate.outputs.observability_verdict }}
          AGENT_SAFETY_VERDICT: ${{ steps.aggregate.outputs['agent-safety_verdict'] }}
          DECISION_RIGOR_VERDICT: ${{ steps.aggregate.outputs['decision-rigor_verdict'] }}
        run: python3 scripts/quality_gate/external_signal_gate.py

      - name: Generate Report
        if: steps.should-run-review.outputs.skip != 'true'
        id: report
        env:
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          FINAL_VERDICT: ${{ steps.aggregate.outputs.final_verdict }}
          SECURITY_VERDICT: ${{ steps.aggregate.outputs.security_verdict }}
          QA_VERDICT: ${{ steps.aggregate.outputs.qa_verdict }}
          ANALYST_VERDICT: ${{ steps.aggregate.outputs.analyst_verdict }}
          ARCHITECT_VERDICT: ${{ steps.aggregate.outputs.architect_verdict }}
          DEVOPS_VERDICT: ${{ steps.aggregate.outputs.devops_verdict }}
          ROADMAP_VERDICT: ${{ steps.aggregate.outputs.roadmap_verdict }}
          RELIABILITY_VERDICT: ${{ steps.aggregate.outputs.reliability_verdict }}
          OBSERVABILITY_VERDICT: ${{ steps.aggregate.outputs.observability_verdict }}
          AGENT_SAFETY_VERDICT: ${{ steps.aggregate.outputs['agent-safety_verdict'] }}
          DECISION_RIGOR_VERDICT: ${{ steps.aggregate.outputs['decision-rigor_verdict'] }}
          SECURITY_CATEGORY: ${{ steps.aggregate.outputs.security_category }}
          QA_CATEGORY: ${{ steps.aggregate.outputs.qa_category }}
          ANALYST_CATEGORY: ${{ steps.aggregate.outputs.analyst_category }}
          ARCHITECT_CATEGORY: ${{ steps.aggregate.outputs.architect_category }}
          DEVOPS_CATEGORY: ${{ steps.aggregate.outputs.devops_category }}
          ROADMAP_CATEGORY: ${{ steps.aggregate.outputs.roadmap_category }}
          RELIABILITY_CATEGORY: ${{ steps.aggregate.outputs.reliability_category }}
          OBSERVABILITY_CATEGORY: ${{ steps.aggregate.outputs.observability_category }}
          AGENT_SAFETY_CATEGORY: ${{ steps.aggregate.outputs['agent-safety_category'] }}
          DECISION_RIGOR_CATEGORY: ${{ steps.aggregate.outputs['decision-rigor_category'] }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          AI_REVIEW_DIR: ai-review
        run: python3 .github/scripts/generate_quality_report.py

      - name: Check for infrastructure failures and add label
        if: steps.should-run-review.outputs.skip != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ env.PR_NUMBER }}
        run: python3 scripts/quality_gate/check_infrastructure_failures.py

      - name: Post PR Comment
        if: steps.should-run-review.outputs.skip != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ env.PR_NUMBER }}
          REPORT_FILE: ${{ steps.report.outputs.report_file }}
        run: python3 scripts/quality_gate/post_pr_comment.py

      - name: Set Job Summary
        if: steps.should-run-review.outputs.skip != 'true'
        shell: pwsh -NoProfile -Command "& '{0}'"
        env:
          REPORT_FILE: ${{ steps.report.outputs.report_file }}
        run: |
          $ErrorActionPreference = 'Stop'
          Get-Content $env:REPORT_FILE | Add-Content $env:GITHUB_STEP_SUMMARY

      - name: Check for Critical Failures
        if: steps.should-run-review.outputs.skip != 'true'
        env:
          FINAL_VERDICT: ${{ steps.aggregate.outputs.final_verdict }}
          SECURITY_VERDICT: ${{ steps.aggregate.outputs.security_verdict }}
          QA_VERDICT: ${{ steps.aggregate.outputs.qa_verdict }}
          ANALYST_VERDICT: ${{ steps.aggregate.outputs.analyst_verdict }}
          ARCHITECT_VERDICT: ${{ steps.aggregate.outputs.architect_verdict }}
          DEVOPS_VERDICT: ${{ steps.aggregate.outputs.devops_verdict }}
          ROADMAP_VERDICT: ${{ steps.aggregate.outputs.roadmap_verdict }}
          RELIABILITY_VERDICT: ${{ steps.aggregate.outputs.reliability_verdict }}
          OBSERVABILITY_VERDICT: ${{ steps.aggregate.outputs.observability_verdict }}
          AGENT_SAFETY_VERDICT: ${{ steps.aggregate.outputs['agent-safety_verdict'] }}
          DECISION_RIGOR_VERDICT: ${{ steps.aggregate.outputs['decision-rigor_verdict'] }}
        run: python3 scripts/quality_gate/check_critical_failures.py
