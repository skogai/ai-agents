# npm Publish
#
# Publishes @rjmurillo/ai-agents to npm with OIDC provenance on tag push.
# Trigger: push a tag matching v* (e.g., v0.1.0).
#
# Prerequisites:
#   1. Link @rjmurillo/ai-agents scope to this GitHub repo in npm UI (one-time).
#   2. npm 2FA enabled on the publishing account.
#   3. See RELEASING.md for full auth setup and rollback procedures.

name: npm Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run npm publish --dry-run only'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Package
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        # yamllint disable-line rule:line-length
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package metadata
        working-directory: packages/ai-agents-cli
        run: |
          node -e "
            const pkg = require('./package.json');
            const errors = [];
            if (pkg.name !== '@rjmurillo/ai-agents')
              errors.push('name must be @rjmurillo/ai-agents');
            if (!pkg.publishConfig?.access ||
                pkg.publishConfig.access !== 'public')
              errors.push('publishConfig.access must be public');
            if (!pkg.publishConfig?.provenance)
              errors.push('publishConfig.provenance must be true');
            if (!pkg.bin) errors.push('bin entry required');
            if (!pkg.files) errors.push('files allowlist required');
            if (errors.length) {
              console.error(errors.join('\n')); process.exit(1);
            }
            console.log('Package metadata OK:',
              pkg.name + '@' + pkg.version);
          "

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/ai-agents-cli
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG_VERSION="${TAG_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

      - name: Measure pack size
        working-directory: packages/ai-agents-cli
        run: |
          SIZE=$(npm pack --dry-run 2>&1 | tail -1)
          echo "Pack size: $SIZE"
          JSON_OUT=$(npm pack --dry-run --json 2>/dev/null)
          BYTES=$(echo "$JSON_OUT" | \
            node -p "JSON.parse(require('fs') \
              .readFileSync('/dev/stdin','utf8'))[0] \
              ?.size || 'unknown'")
          LIMIT=52428800
          if [ "$BYTES" != "unknown" ] && [ "$BYTES" -gt "$LIMIT" ]; then
            echo "::warning::Pack size exceeds 50MB threshold"
          fi

  publish:
    name: Publish to npm
    needs: validate
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        # yamllint disable-line rule:line-length
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: packages/ai-agents-cli
        run: npm ci

      - name: Build
        working-directory: packages/ai-agents-cli
        run: npm run build --if-present

      - name: Publish (dry-run)
        # yamllint disable-line rule:line-length
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.dry-run == 'true'
        working-directory: packages/ai-agents-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --dry-run

      - name: Publish
        # yamllint disable-line rule:line-length
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.dry-run == 'false')
        working-directory: packages/ai-agents-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Verify published package
        # yamllint disable-line rule:line-length
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.dry-run == 'false')
        working-directory: packages/ai-agents-cli
        run: |
          EXPECTED=$(node -p "require('./package.json').version")
          echo "Expecting @rjmurillo/ai-agents@${EXPECTED}"
          for i in 1 2 3 4 5; do
            sleep 10
            PUBLISHED=$(npm view "@rjmurillo/ai-agents@${EXPECTED}" version 2>/dev/null || true)
            if [ "$PUBLISHED" = "$EXPECTED" ]; then
              echo "Verified: @rjmurillo/ai-agents@${EXPECTED} is live on npm"
              exit 0
            fi
            echo "Attempt $i: version ${EXPECTED} not yet visible, retrying..."
          done
          echo "::error::Version ${EXPECTED} not visible on npm after 50s"
          exit 1
