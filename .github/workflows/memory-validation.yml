---
name: Memory Validation

on:
  pull_request:
    # NOTE: No paths filter here - use dorny/paths-filter internally
    # This ensures skip-validation job runs to satisfy required checks
    # See: .serena/memories/ci-infrastructure-dorny-paths-filter-checkout.md
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check-paths:
    name: Detect changes
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    outputs:
      memories-changed: ${{ steps.filter.outputs.memories }}
      code-changed: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check path filters
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            memories:
              - '.serena/memories/**'
            code:
              - '.claude/skills/memory-enhancement/src/memory_enhancement/**'
              - 'scripts/**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'

  validate-memories:
    name: Validate memory citations
    needs: check-paths
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Check if validation needed
        id: should-run
        env:
          MEMORIES_CHANGED: ${{ needs.check-paths.outputs.memories-changed }}
          CODE_CHANGED: ${{ needs.check-paths.outputs.code-changed }}
        run: |
          if [ "$MEMORIES_CHANGED" != "true" ] && [ "$CODE_CHANGED" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipped - no memory or code changes detected"
          fi

      - name: Checkout code
        if: steps.should-run.outputs.skip != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup code environment
        if: steps.should-run.outputs.skip != 'true'
        uses: ./.github/actions/setup-code-env
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pester: false
          enable-git-hooks: false

      - name: Validate memory tier hierarchy (ADR-017)
        if: steps.should-run.outputs.skip != 'true'
        id: tier-validation
        continue-on-error: true
        run: python3 scripts/validate_memory_tier.py --ci

      - name: Report tier validation result
        if: steps.should-run.outputs.skip != 'true' && steps.tier-validation.outcome == 'failure'
        run: |
          echo "::warning::Memory tier validation found issues (non-blocking). Run 'python3 scripts/validate_memory_tier.py' locally to see details."

      - name: Validate memory index consistency (ADR-017)
        if: steps.should-run.outputs.skip != 'true'
        id: index-validation
        run: python3 scripts/validation/memory_index.py --path .serena/memories --ci --format console

      - name: Verify all memories
        if: steps.should-run.outputs.skip != 'true'
        id: verify
        continue-on-error: true
        run: |
          python -m memory_enhancement verify-all --json > memory-validation-results.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Generate health report
        if: steps.should-run.outputs.skip != 'true'
        run: |
          python -m memory_enhancement verify-all > memory-health-report.md

      - name: Upload validation results
        if: always() && steps.should-run.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: memory-validation-results
          path: |
            memory-validation-results.json
            memory-health-report.md
          retention-days: 7

      - name: Parse validation results
        if: steps.should-run.outputs.skip != 'true'
        id: parse
        run: |
          if [ -f memory-validation-results.json ]; then
            total=$(jq 'length' memory-validation-results.json)
            stale=$(jq '[.[] | select(.valid == false)] | length' memory-validation-results.json)
            valid=$((total - stale))

            echo "total=$total" >> $GITHUB_OUTPUT
            echo "valid=$valid" >> $GITHUB_OUTPUT
            echo "stale=$stale" >> $GITHUB_OUTPUT

            if [ "$stale" -gt 0 ]; then
              echo "has_stale=true" >> $GITHUB_OUTPUT
            else
              echo "has_stale=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_stale=false" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        if: steps.should-run.outputs.skip != 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('memory-health-report.md', 'utf8');
            const hasStale = '${{ steps.parse.outputs.has_stale }}' === 'true';

            const status = hasStale ? '⚠️  Warning' : '✅ Pass';
            const message = `<!-- MEMORY-VALIDATION -->
            ## ${status}: Memory Validation

            ${report}

            ---
            <details>
            <summary>📊 Validation Details</summary>

            - **Total memories checked**: ${{ steps.parse.outputs.total }}
            - **Valid**: ${{ steps.parse.outputs.valid }}
            - **Stale**: ${{ steps.parse.outputs.stale }}

            </details>`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('<!-- MEMORY-VALIDATION -->')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: message
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: message
              });
            }

      - name: Set job status
        if: steps.should-run.outputs.skip != 'true' && steps.parse.outputs.has_stale == 'true'
        run: |
          echo "::warning::Found ${{ steps.parse.outputs.stale }} memories with stale citations"
          # Currently non-blocking - change to 'exit 1' to make blocking
