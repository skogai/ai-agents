# Validate Generated Agent Files
#
# Ensures generated agent files haven't been edited directly.
# Regenerates all agents from templates and fails if committed files differ.
#
# Local developers and AI agents can run the same validation using:
#   python3 build/generate_agents.py --validate

name: Validate Generated Agents

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
    # NO paths filter - use dorny/paths-filter internally to satisfy required checks
  pull_request:
    branches:
      - main
    # NO paths filter - use dorny/paths-filter internally to satisfy required checks
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: validate-agents-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Check if relevant files changed using paths-filter
  check-paths:
    name: Check Paths
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    outputs:
      # For workflow_dispatch, always run validation; otherwise use paths-filter result
      should-run-agents: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.determine.outputs.should-run-agents }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Check for relevant file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        # Skip paths-filter for workflow_dispatch as it may not have proper context
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            agents:
              - 'templates/**'
              - 'src/vs-code-agents/**'
              - 'src/copilot-cli/**'
              - 'src/claude/**'
              - 'build/generate_agents.py'
              - 'build/scripts/**'
              - '.claude/agents/**'
              - '.claude/skills/**'
              - '.claude/hooks/**'
              - '.claude/settings.json'
              - '.claude/rules/**'
              - '.github/agents/**'
              - '.github/instructions/**'
              - '.github/workflows/validate-generated-agents.yml'

      - name: Determine if validation should run
        id: determine
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-run-agents=true" >> "$GITHUB_OUTPUT"
            echo "Decision: Run validation (manual trigger)"
          else
            AGENTS="${{ steps.filter.outputs.agents }}"

            echo "Agent files changed: $AGENTS"

            # Run validation if agent files changed, skip otherwise
            if [ "$AGENTS" = "true" ]; then
              echo "should-run-agents=true" >> "$GITHUB_OUTPUT"
              echo "Decision: Run validation (agent files changed)"
            else
              echo "should-run-agents=false" >> "$GITHUB_OUTPUT"
              echo "Decision: Skip validation (no agent files changed)"
            fi
          fi

  validate:
    name: Validate Generated Files
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    permissions:
      contents: read

    steps:
      - name: Check if validation needed
        id: should-run
        env:
          SHOULD_VALIDATE: ${{ needs.check-paths.outputs.should-run-agents }}
        run: |
          if [ "$SHOULD_VALIDATE" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No agent files changed - skipping validation"
          fi

      - name: Checkout repository
        if: steps.should-run.outputs.skip != 'true'
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          # fetch-depth: 0 so the install-parity step can resolve
          # origin/<base> and the push-event before-SHA without a
          # follow-up fetch. The validator diffs against a base ref; a
          # shallow checkout leaves that ref unresolvable.
          fetch-depth: 0

      - name: Regenerate and validate agent files
        if: steps.should-run.outputs.skip != 'true'
        run: |
          echo "Running agent generation in validation mode..."
          python3 build/generate_agents.py --validate

      - name: Build-all staleness check (REQ-003-005)
        if: steps.should-run.outputs.skip != 'true'
        # Run the M3 orchestrator in --check mode. Fails (exit 2) if any
        # generator output is stale relative to the source. Catches the
        # "forgot to regenerate skills/agents" class of error before merge.
        run: |
          echo "Running build_all.py --check..."
          python3 build/scripts/build_all.py --check

      - name: Install-parity check (changed-together siblings)
        if: steps.should-run.outputs.skip != 'true'
        # Catches the class of drift the build-all generator cannot:
        # the install copies under .claude/agents/ and .github/agents/
        # are hand-maintained self-host copies and must move together
        # with the shared template under templates/agents/ and the three
        # vendored copies under src/. PR #2087 (qa) and PR #2083
        # (orchestrator) are the regressions this gate prevents.
        #
        # Per ADR-006 (Thin Workflows, Testable Modules), the fetch +
        # base-ref resolution + validator invocation live in
        # scripts/validation/run_install_parity_ci.py. The YAML step
        # passes inputs via environment variables and runs one command.
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
          PUSH_BEFORE_SHA: ${{ github.event_name == 'push' && github.event.before || '' }}
        run: |
          python3 scripts/validation/run_install_parity_ci.py

      - name: Plugin lib sync check (M7-T1)
        if: steps.should-run.outputs.skip != 'true'
        # `scripts/hook_utilities/` and `scripts/github_core/` are the
        # canonical sources; `.claude/lib/` carries plugin-distributed
        # copies with relative imports. The sync script has a --check
        # mode that exits 1 on any drift between source and copy.
        # Without this gate, a contributor could add a function to
        # scripts/hook_utilities/ without running the sync script and
        # the lib copy would silently fall behind.
        run: |
          echo "Running sync_plugin_lib.py --check..."
          python3 scripts/sync_plugin_lib.py --check

      - name: Plugin manifest version parity check (Issue #2222)
        if: steps.should-run.outputs.skip != 'true'
        # Both `.claude/.claude-plugin/plugin.json` and
        # `src/copilot-cli/.claude-plugin/plugin.json` must declare
        # identical `version` fields. Prevents the drift class where
        # one manifest bumps version but the other is forgotten.
        # Exits 1 on mismatch, 2 on malformed input, 0 on parity.
        run: |
          echo "Running check_plugin_manifest_parity.py..."
          python3 build/scripts/check_plugin_manifest_parity.py

      - name: Validate GitHub Actions SHA Pinning
        if: steps.should-run.outputs.skip != 'true'
        shell: bash
        run: |
          echo "Validating GitHub Actions SHA pinning..."
          python3 scripts/validation/sha_pinning.py --ci

      - name: Show diff on failure
        if: failure() && steps.should-run.outputs.skip != 'true'
        run: |
          echo ""
          echo "=== Files that differ from generated output ==="
          echo ""

          # Regenerate without validation to get the expected content
          python3 build/generate_agents.py

          # Show which files changed
          CHANGED_FILES=$(git diff --name-only)

          if [ -n "$CHANGED_FILES" ]; then
            echo "The following generated files were manually edited:"
            echo ""
            echo "$CHANGED_FILES" | while read -r file; do
              echo "  - $file"
            done
            echo ""
            echo "To fix this issue:"
            echo "  1. Edit the source template in templates/agents/*.shared.md"
            echo "  2. Run: python3 build/generate_agents.py"
            echo "  3. Commit the regenerated files"
            echo ""
            echo "=== Detailed diff ==="
            git diff
          else
            echo "No differences detected in git diff (validation may have failed for other reasons)"
          fi
