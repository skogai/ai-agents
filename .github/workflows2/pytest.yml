# Python Tests
#
# Runs pytest and security checks for Python code in the repository.
# Uses dorny/paths-filter to determine if tests should run or be skipped.
#
# IMPORTANT: This workflow runs on ALL PRs to satisfy required status checks,
# but skips actual test execution when no Python files are changed.
#
# Testable paths are defined in the check-paths job filters block.
#
# Local developers and AI agents can run the same tests using:
#   uv run pytest
#   uv run pip-audit
#   uv run bandit -r .claude/ scripts/

name: Python Tests

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-paths:
    name: Check Changed Paths
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    outputs:
      python-changed: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check for Python file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'tests/conftest.py'
              - 'scripts/memory_enhancement/**'
              - '.github/workflows/pytest.yml'

      - name: Report path check result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger - running all tests"
          else
            echo "Python files changed: ${{ steps.filter.outputs.python }}"
          fi

  test:
    name: Run Python Tests
    needs: check-paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Check if tests needed
        id: should-run
        env:
          PYTHON_CHANGED: ${{ needs.check-paths.outputs.python-changed }}
        run: |
          if [ "$PYTHON_CHANGED" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No Python files changed - skipping tests"
          fi

      - name: Harden Runner
        if: steps.should-run.outputs.skip != 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: steps.should-run.outputs.skip != 'true'

      - name: Setup code environment
        if: steps.should-run.outputs.skip != 'true'
        uses: ./.github/actions/setup-code-env
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pester: false
          enable-git-hooks: false

      # Issue #2194: ruff is configured in pyproject.toml ([tool.ruff]) but no CI
      # workflow ran it. The repository has a pre-existing backlog of 2026 ruff
      # findings (measured 2026-06-01 with ruff>=0.15.14), so this step is
      # report-only (continue-on-error: true). It annotates the PR diff with
      # findings via --output-format=github without blocking merges. Flip to a
      # blocking gate (drop continue-on-error) once the backlog reaches zero.
      # See pyproject.toml for the lint config; the invocation matches the
      # baseline command `ruff check .`. ruff is installed via the
      # setup-code-env action (uv pip install --system -e ".[dev]").
      - name: Run ruff (report-only)
        if: steps.should-run.outputs.skip != 'true'
        continue-on-error: true
        run: ruff check . --output-format=github

      - name: Run pytest
        if: steps.should-run.outputs.skip != 'true'
        run: |
          mkdir -p artifacts
          pytest --cov --cov-report=xml:artifacts/coverage.xml --junitxml=artifacts/pytest-results.xml

      # Issue #1963: test_ai_review.py was split by tested module into
      # test_verdict.py (get_verdict, merge_verdicts, extract_verdict, verdict
      # presentation helpers) and test_quality_gate.py (get_failure_category,
      # spec_validation_failed). scripts.ai_review_common.verdict hosts all of
      # those plus the label/milestone helpers that remain in test_ai_review.py,
      # so the 100% gate must run all three files. Running test_ai_review.py
      # alone now reports 63% and trips --cov-fail-under=100.
      - name: Pin ai_review_common.verdict coverage at 100% (REQ-008-07)
        if: steps.should-run.outputs.skip != 'true'
        run: pytest tests/test_ai_review.py tests/test_verdict.py tests/test_quality_gate.py --cov=scripts.ai_review_common.verdict --cov-branch --cov-fail-under=100

      # Issue #2063 (revised): module-name form is the canonical form for this
      # repository. The file-path form (--cov=.claude/skills/.../*.py) was
      # tested in PR #2078 and produces "Module never imported" + 0% coverage
      # with pytest-cov 7.x on Python 3.14, tripping --cov-fail-under=100. The
      # module-name form resolves correctly via conftest.py sys.path setup and
      # reports the actual 100%. Do not switch forms without re-verifying both
      # locally and in CI.
      - name: Pin REQ-009 module coverage at 100% (PR #1989 user requirement)
        if: steps.should-run.outputs.skip != 'true'
        run: |
          pytest \
            tests/skills/github/test_wait_for_unresolved_zero.py \
            tests/skills/session-end/test_rework_warning.py \
            --cov=wait_for_unresolved_zero \
            --cov=rework_warning \
            --cov-branch --cov-fail-under=100

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && steps.should-run.outputs.skip != 'true'
        with:
          name: pytest-results
          path: artifacts/
          retention-days: 7

  security:
    name: Python Security Checks
    needs: check-paths
    if: needs.check-paths.outputs.python-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup code environment
        uses: ./.github/actions/setup-code-env
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pester: false
          enable-git-hooks: false

      - name: Run pip-audit
        run: |
          # Keep the audited environment on the first fixed pip release for
          # PYSEC-2026-196. CI hit pip 26.1.1 after setup-code-env installed
          # dependencies, and pip-audit reports the fixed version as 26.1.2.

          # Ignored CVEs (re-evaluate when upstream releases a fix):
          #   CVE-2026-4539: pygments 2.19.2, no fix available.
          #   CVE-2026-3219: historical pip 26.0/26.0.1 finding for
          #     concatenated tar/ZIP archives. The runner is upgraded to pip
          #     26.1.2 below; keep this ignore only while pip-audit still
          #     reports stale transitive runner metadata after that upgrade.
          #   CVE-2026-6357: historical pip 26.0.x finding in the same
          #     local-only class as CVE-2026-3219. Remove this ignore when
          #     pip-audit no longer reports it after the pip 26.1.2 upgrade.
          python -m pip install --upgrade "pip==26.1.2"
          pip-audit \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2026-3219 \
            --ignore-vuln CVE-2026-6357

      - name: Run Bandit
        run: |
          mkdir -p artifacts
          bandit -r .claude/ scripts/ -f sarif -o artifacts/bandit-results.sarif || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bandit-results
          path: artifacts/bandit-results.sarif
          retention-days: 7

  # Pass-through job: satisfies required "Run Python Tests" check when no Python files changed.
  # GitHub branch protection requires SUCCESS (not SKIPPED) for required checks.
  # See: Issue #1168
  skip-tests:
    name: Run Python Tests
    needs: check-paths
    if: needs.check-paths.outputs.python-changed != 'true'
    # ADR-025: ARM runner for cost optimization
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Skip tests (no Python files changed)
        run: |
          echo "No Python files changed - skipping tests"
          echo ""
          echo "See the 'python' filter in check-paths job for paths that trigger tests."
          echo "Reference: .github/workflows/pytest.yml"

  # ─── Windows pwsh contract test (fix #2231 item 1) ─────────────────────────
  # The PowerShell path-resolution contract test is guarded by
  # `skipif(shutil.which("pwsh") is None)`, so it never runs on Linux ubuntu
  # runners. Windows is where #2205 was first reported. This job ensures the
  # pwsh branch of test_generate_hooks_runtime_contract.py runs on an always-on
  # Windows runner. No auth or external credentials needed: the test is purely
  # path-resolution (generates hooks into a tmp dir and verifies resolution).
  test-windows-pwsh:
    name: Run Python Tests (Windows - pwsh contract)
    needs: check-paths
    if: needs.check-paths.outputs.python-changed == 'true'
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Run pwsh hook contract tests
        shell: pwsh
        run: uv run pytest tests/build_scripts/test_generate_hooks_runtime_contract.py -v -k "powershell"
