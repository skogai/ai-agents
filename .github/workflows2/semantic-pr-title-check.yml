# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Semantic PR Title Check"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

concurrency:
  group: "semantic-pr-check-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    steps:
      - name: Skip for bot actors
        if: github.actor == 'dependabot[bot]' || github.actor == 'github-actions[bot]' || github.actor == 'renovate[bot]'
        env:
          GH_ACTOR: ${{ github.actor }}
        run: echo "Skipped - bot actor ($GH_ACTOR)"

      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]' && github.actor != 'renovate[bot]'
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
            build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
