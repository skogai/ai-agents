schemaVersion: "1.0"
provider: "visual-studio"
# REQ-003 targets copilot-cli first; visual-studio artifacts stanzas will be
# populated when the multi-tool build extends to this provider. The schema
# header is required so all platform configs validate under the same gate
# (ADR-006 Amendment 2026-04-28, Conditions 3 + 5).
# Legacy keys preserved for backward-compat with existing build/generate_agents.py.
legacy:
  outputDir: "src/vs-code-agents"
  fileExtension: ".agent.md"
  frontmatter:
    model: "Claude Opus 4.6 (copilot)"
    includeNameField: false
  model_tiers:
    opus: "Claude Opus 4.6 (copilot)"
    sonnet: "Claude Sonnet 4.6 (copilot)"
    haiku: "Claude Haiku 4.5 (copilot)"
  handoffSyntax: "#runSubagent"
  toolsFrom: "vscode"
  toolSyntax: "path"
  memoryPrefix: "serena/"
