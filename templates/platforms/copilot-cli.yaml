schemaVersion: "1.0"
provider: "copilot-cli"
artifacts:
  agents:
    sourceDir: ".claude/agents"
    outputDir: "src/copilot-cli/agents"
    sourceSuffix: ".md"
    outputSuffix: ".agent.md"
    excludeFilenames: ["AGENTS.md", "CLAUDE.md"]
  skills:
    sourceDir: ".claude/skills"
    outputDir: "src/copilot-cli/skills"
    mode: "directory-copy"
    # merge-resolver is hard-wired to this repo's layout (gh, .agents/sessions,
    # .serena, session-protocol scripts) and does not generalize to other repos.
    # It stays in .claude/skills for ai-agents' own use but is omitted from the
    # publicly-shipping copilot-cli toolkit (issue #2026).
    excludeFilenames: ["AGENTS.md", "CLAUDE.md", "merge-resolver"]
  commands:
    sourceDir: ".claude/commands"
    outputDir: "src/copilot-cli/skills"
    transform: "command-to-skill"
    appendFrontmatter:
      user-invocable: true
  rules:
    sourceDir: ".claude/rules"
    # Dual-target: ships rules to the canonical Copilot instructions
    # tree AND to the project-toolkit plugin tree so vendor installs
    # via marketplace pick them up alongside agents, skills, and hooks.
    outputDirs:
      - ".github/instructions"
      - "src/copilot-cli/instructions"
    sourceSuffix: ".md"
    outputSuffix: ".instructions.md"
    frontmatterRemap:
      paths: applyTo
    frontmatterDrop:
      - alwaysApply
      - priority
  lib:
    sourceDir: ".claude/lib"
    outputDir: "src/copilot-cli/lib"
  hooks:
    settingsSource: ".claude/settings.json"
    scriptSource: ".claude/hooks"
    outputConfig: "src/copilot-cli/hooks/hooks.json"
    outputScripts: "src/copilot-cli/hooks"
    eventRemap:
      PreToolUse: preToolUse
      PostToolUse: postToolUse
      Stop: sessionEnd
      SessionStart: sessionStart
      UserPromptSubmit: userPromptSubmitted
    eventDrop:
      - SubagentStop
      - PermissionRequest
      - Notification
      - PreCompact
    matcherPolicy: "inline-script-shim"
    versionField: 1
auditPolicy:
  pathBlocklist:
    - "^/home/"
    - "^/Users/"
    - "^/root/"
    - "@[a-f0-9]{40}\\b"
    - "GITHUB_TOKEN"
    - "SECRET"
  output:
    file: "build/audit/GENERATION-AUDIT.md"
    stdoutFormat: "json"
# Legacy keys: still load-bearing. Consumed by build/generate_agents.py
# (grep `platform.get("legacy")` and `legacy.get(`) for outputDir,
# fileExtension, toolsFrom, handoffSyntax, memoryPrefix, frontmatter, and
# the model_tiers map. Remove this block only after generate_agents.py is
# migrated to read those values from the `artifacts.agents` stanza directly.
legacy:
  # Issue #2052: Copilot CLI plugin loader discovers agents under
  # `agents/` only. Files at the plugin root are silently dropped.
  outputDir: "src/copilot-cli/agents"
  fileExtension: ".agent.md"
  frontmatter:
    model: "claude-opus-4.6"
    includeNameField: true
  model_tiers:
    opus: "claude-opus-4.6"
    sonnet: "claude-sonnet-4.6"
    haiku: "claude-haiku-4.5"
  handoffSyntax: "/agent"
  toolSyntax: "path"
  memoryPrefix: "serena/"
